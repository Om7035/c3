<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>C³ Observatory — Cognitive Computation Compiler</title>
<meta name="description" content="Watch your question compile into a reasoning program in real time. C³ is a reasoning compiler that dynamically synthesizes computation tailored to each problem." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #080b14;
    --surface: #0d1425;
    --surface2: #121a30;
    --surface3: #1a2440;
    --border: rgba(99,140,255,0.15);
    --border-active: rgba(99,140,255,0.5);
    --text: #e2e8f7;
    --text-muted: #6b7fa8;
    --text-dim: #3d4f72;
    --accent: #638cff;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --warn: #fbbf24;
    --danger: #f87171;
    --know: #60a5fa;
    --exec: #f59e0b;
    --reas: #a78bfa;
    --veri: #34d399;
    --glow: 0 0 24px rgba(99,140,255,0.18);
    --glow-active: 0 0 40px rgba(99,140,255,0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,11,20,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 380px 1fr;
    height: calc(100vh - 65px);
  }

  /* ── Left panel ── */
  .left {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 28px 24px;
    gap: 20px;
    background: var(--surface);
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
  }

  .query-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  textarea#query {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 14px;
    resize: vertical;
    min-height: 90px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea#query:focus {
    border-color: var(--border-active);
    box-shadow: var(--glow);
  }
  textarea#query::placeholder { color: var(--text-dim); }

  .btn-compile {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.01em;
  }
  .btn-compile:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-compile:active { transform: translateY(0); }
  .btn-compile:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .presets {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .preset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 9px 12px;
    text-align: left;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .preset-btn:hover {
    border-color: var(--border-active);
    color: var(--text);
    background: var(--surface3);
  }

  .preset-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    display: block;
    margin-bottom: 2px;
  }

  /* Register bank */
  .reg-bank {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .reg-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 10px;
    background: var(--surface2);
    border-radius: 7px;
    border: 1px solid var(--border);
    animation: reg-flash 0.4s ease;
  }

  @keyframes reg-flash {
    0% { border-color: var(--accent); background: rgba(99,140,255,0.08); }
    100% { border-color: var(--border); background: var(--surface2); }
  }

  .reg-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
    padding-top: 1px;
  }

  .reg-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    word-break: break-all;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* ── Right panel ── */
  .right {
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Stage cards */
  .stage-card {
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--surface);
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .stage-card.active {
    border-color: var(--border-active);
    box-shadow: var(--glow-active);
  }

  .stage-card.done {
    border-color: rgba(52,211,153,0.25);
  }

  .stage-card.error-state {
    border-color: rgba(248,113,113,0.4);
  }

  .stage-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .stage-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .stage-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .stage-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid;
  }
  .status-idle { color: var(--text-dim); border-color: var(--text-dim); }
  .status-running { color: var(--accent); border-color: var(--accent); animation: pulse 1s infinite; }
  .status-done { color: var(--accent3); border-color: var(--accent3); }
  .status-error { color: var(--danger); border-color: var(--danger); }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .stage-body {
    padding: 16px 18px;
    display: none;
  }
  .stage-body.visible { display: block; }

  /* JSON viewer */
  .json-view {
    background: var(--bg);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 220px;
    overflow-y: auto;
    border: 1px solid var(--border);
  }

  /* Problem class badge */
  .class-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 500;
    margin-bottom: 10px;
  }

  /* Diagnostic list */
  .diag-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .diag-item {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    padding: 8px 10px;
    border-radius: 7px;
    font-size: 12px;
  }
  .diag-warn { background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.2); color: var(--warn); }
  .diag-error { background: rgba(248,113,113,0.06); border: 1px solid rgba(248,113,113,0.2); color: var(--danger); }
  .diag-ok { background: rgba(52,211,153,0.06); border: 1px solid rgba(52,211,153,0.2); color: var(--accent3); }
  .diag-code { font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.7; flex-shrink: 0; }

  /* Node graph */
  .node-graph { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

  .rir-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .rir-node-box {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .rir-node-box.KNOW { border-color: rgba(96,165,250,0.4); color: var(--know); background: rgba(96,165,250,0.06); }
  .rir-node-box.EXEC { border-color: rgba(245,158,11,0.4); color: var(--exec); background: rgba(245,158,11,0.06); }
  .rir-node-box.REAS { border-color: rgba(167,139,250,0.4); color: var(--reas); background: rgba(167,139,250,0.06); }
  .rir-node-box.VERI { border-color: rgba(52,211,153,0.4); color: var(--veri); background: rgba(52,211,153,0.06); }

  .rir-node-box.executing {
    box-shadow: 0 0 16px currentColor;
    opacity: 1;
    transform: scale(1.05);
  }

  .rir-node-box.executed { opacity: 0.6; }

  .rir-node-reg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
  }

  .rir-arrow {
    font-size: 16px;
    color: var(--text-dim);
    flex-shrink: 0;
    padding-top: 12px;
  }

  /* Provenance events */
  .prov-list { display: flex; flex-direction: column; gap: 6px; }
  .prov-event {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px;
    animation: slide-in 0.3s ease;
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateX(12px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .prov-opcode {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
  }
  .prov-node-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }
  .prov-conf {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    text-align: right;
  }
  .prov-latency {
    font-size: 10px;
    color: var(--text-dim);
    text-align: right;
  }

  /* Metrics grid */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .metric-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .metric-label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .metric-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .metric-unit { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .re-banner {
    background: linear-gradient(135deg, rgba(99,140,255,0.1), rgba(167,139,250,0.1));
    border: 1px solid var(--border-active);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }
  .re-label { font-size: 12px; color: var(--text-muted); }
  .re-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .re-note { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-dim);
    text-align: center;
  }
  .empty-icon { font-size: 48px; opacity: 0.3; }
  .empty-title { font-size: 16px; font-weight: 500; color: var(--text-muted); }
  .empty-sub { font-size: 13px; max-width: 320px; line-height: 1.6; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(99,140,255,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">C³</span>
    <div>
      <div style="font-size:14px;font-weight:600;letter-spacing:-0.01em">Observatory</div>
      <div class="logo-sub">Cognitive Computation Compiler</div>
    </div>
  </div>
  <span class="header-tag">v1.0 · Milestone 5</span>
</header>

<div class="app">
  <!-- Left Panel -->
  <div class="left">
    <div class="query-area">
      <div class="section-label">Query</div>
      <textarea id="query" placeholder="Ask anything. Watch it compile.">What is the population of Tokyo?</textarea>
      <button class="btn-compile" id="compileBtn" onclick="runPipeline()">
        <span id="btnIcon">▶</span>
        <span id="btnText">Compile & Execute</span>
      </button>
    </div>

    <div class="presets">
      <div class="section-label">Benchmark Presets</div>
      <button class="preset-btn" onclick="setQuery(this, 'What is the population of Tokyo?')">
        <span class="preset-tag">BM-01 · factual_lookup</span>
        What is the population of Tokyo?
      </button>
      <button class="preset-btn" onclick="setQuery(this, 'Solve the integral: compute the area under x-squared from 0 to 3')">
        <span class="preset-tag">BM-02 · analytical_reasoning</span>
        Solve the integral: x² from 0 to 3
      </button>
      <button class="preset-btn" onclick="setQuery(this, 'Design a distributed cache system for 1 million requests per second')">
        <span class="preset-tag">BM-03 · design_planning</span>
        Design a distributed cache for 1M RPS
      </button>
      <button class="preset-btn" onclick="setQuery(this, 'Critique this business plan: a subscription app for daily motivational quotes')">
        <span class="preset-tag">BM-04 · critical_evaluation</span>
        Critique a daily-quotes business plan
      </button>
      <button class="preset-btn" onclick="setQuery(this, 'Explain Hamlet\'s motivations throughout the play')">
        <span class="preset-tag">BM-05 · interpretive_reasoning</span>
        Explain Hamlet's motivations
      </button>
    </div>

    <div>
      <div class="section-label">Register Bank</div>
      <div class="reg-bank" id="regBank">
        <div style="font-size:12px;color:var(--text-dim);padding:8px">No registers allocated yet.</div>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right" id="pipeline">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">⬡</div>
      <div class="empty-title">The Observatory is ready</div>
      <div class="empty-sub">Enter a query and click <strong>Compile &amp; Execute</strong> to watch C³ synthesize a reasoning program in real time.</div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';

const STAGE_DEFS = [
  { id: 'analyzer',  icon: '🔍', label: 'Problem Analyzer',          color: '#638cff' },
  { id: 'planner',   icon: '🗺',  label: 'Strategy Builder (AST)',    color: '#a78bfa' },
  { id: 'validator', icon: '🛡',  label: 'Strategy Validator',        color: '#fbbf24' },
  { id: 'compiler',  icon: '⚙',  label: 'Compiler  (RIR Synthesis)', color: '#60a5fa' },
  { id: 'optimizer', icon: '✦',  label: 'Pass Manager (Optimization)',color: '#f59e0b' },
  { id: 'runtime',   icon: '▶',  label: 'Reasoning Runtime',         color: '#34d399' },
  { id: 'metrics',   icon: '📊', label: 'Reasoning Provenance (RPS)', color: '#a78bfa' },
];

let stageEls = {};
let nodeEls = {};
let registers = {};

function setQuery(btn, q) {
  document.getElementById('query').value = q;
}

function resetUI() {
  document.getElementById('emptyState')?.remove();
  registers = {};
  nodeEls = {};
  stageEls = {};
  updateRegBank({});

  const pipeline = document.getElementById('pipeline');
  pipeline.innerHTML = '';

  STAGE_DEFS.forEach(def => {
    const card = document.createElement('div');
    card.className = 'stage-card';
    card.id = `card-${def.id}`;
    card.innerHTML = `
      <div class="stage-header">
        <div class="stage-icon" style="background:${def.color}18;color:${def.color}">${def.icon}</div>
        <span class="stage-title">${def.label}</span>
        <span class="stage-status status-idle" id="status-${def.id}">idle</span>
      </div>
      <div class="stage-body" id="body-${def.id}"></div>
    `;
    pipeline.appendChild(card);
    stageEls[def.id] = card;
  });
}

function setStageStatus(id, status) {
  const el = document.getElementById(`status-${id}`);
  const card = document.getElementById(`card-${id}`);
  if (!el || !card) return;
  el.className = `stage-status status-${status}`;
  el.textContent = status === 'running' ? 'compiling…' : status;
  card.className = `stage-card ${status === 'running' ? 'active' : status === 'done' ? 'done' : status === 'error' ? 'error-state' : ''}`;
  if (status === 'running' && el.textContent === 'compiling…') {
    el.innerHTML = `<span class="spinner"></span> running`;
  }
}

function showBody(id) {
  const body = document.getElementById(`body-${id}`);
  if (body) body.className = 'stage-body visible';
}

function setBody(id, html) {
  const body = document.getElementById(`body-${id}`);
  if (body) { body.className = 'stage-body visible'; body.innerHTML = html; }
}

function updateRegBank(regs) {
  const el = document.getElementById('regBank');
  if (!Object.keys(regs).length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text-dim);padding:8px">No registers allocated yet.</div>';
    return;
  }
  el.innerHTML = Object.entries(regs).map(([k,v]) => `
    <div class="reg-row">
      <span class="reg-name">$${k}</span>
      <span class="reg-value">${JSON.stringify(v).substring(0, 80)}</span>
    </div>
  `).join('');
}

function opcodeFamily(opcode) {
  return opcode.split('.')[0];
}

function colorForOpcode(opcode) {
  const f = opcodeFamily(opcode);
  return { KNOW: '#60a5fa', EXEC: '#f59e0b', REAS: '#a78bfa', VERI: '#34d399' }[f] || '#638cff';
}

function renderNodeGraph(nodes, edges) {
  const html = nodes.map((n, i) => {
    const family = opcodeFamily(n.opcode);
    const arrow = i < nodes.length - 1 ? '<div class="rir-arrow">→</div>' : '';
    return `
      <div class="rir-node">
        <div class="rir-node-box ${family}" id="rirnode-${n.id}">${n.opcode}</div>
        <div class="rir-node-reg">${n.outputs?.[0] ?? ''}</div>
      </div>
      ${arrow}
    `;
  }).join('');
  nodeEls = {};
  nodes.forEach(n => { nodeEls[n.id] = n; });
  return `<div class="node-graph">${html}</div>`;
}

function highlightNode(nodeId, status) {
  const el = document.getElementById(`rirnode-${nodeId}`);
  if (!el) return;
  if (status === 'executing') {
    el.classList.add('executing');
    el.classList.remove('executed');
  } else {
    el.classList.remove('executing');
    el.classList.add('executed');
  }
}

async function runPipeline() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;

  const btn = document.getElementById('compileBtn');
  btn.disabled = true;
  document.getElementById('btnText').textContent = 'Compiling…';
  document.getElementById('btnIcon').innerHTML = '<span class="spinner"></span>';

  resetUI();

  let provList = null;
  let currentNodes = [];

  try {
    const res = await fetch(`${API}/compile`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      const parts = buf.split('\n\n');
      buf = parts.pop();

      for (const part of parts) {
        const lines = part.trim().split('\n');
        let event = '', dataStr = '';
        for (const line of lines) {
          if (line.startsWith('event:')) event = line.slice(6).trim();
          if (line.startsWith('data:')) dataStr = line.slice(5).trim();
        }
        if (!event || !dataStr) continue;

        let data;
        try { data = JSON.parse(dataStr); } catch { continue; }

        // ── Handle events ──
        if (event === 'stage_start') {
          setStageStatus(data.stage, 'running');
          showBody(data.stage);
        }

        else if (event === 'analyzer_done') {
          setStageStatus('analyzer', 'done');
          const colors = { factual_lookup:'#60a5fa', analytical_reasoning:'#a78bfa', design_planning:'#f59e0b', critical_evaluation:'#f87171', interpretive_reasoning:'#34d399' };
          const c = colors[data.problem_class] || '#638cff';
          setBody('analyzer', `
            <span class="class-badge" style="background:${c}18;border:1px solid ${c}40;color:${c}">
              ${data.problem_class}
            </span>
            <div class="json-view">${JSON.stringify(data, null, 2)}</div>
          `);
        }

        else if (event === 'strategy_done') {
          setStageStatus('planner', 'done');
          const s = data.strategy;
          setBody('planner', `
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
              ${s.knowledge_requirements.map(r=>`<span style="font-family:monospace;font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.2);color:#60a5fa">${r}</span>`).join('')}
              ${s.reasoning_requirements.map(r=>`<span style="font-family:monospace;font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.2);color:#a78bfa">${r}</span>`).join('')}
              <span style="font-family:monospace;font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);color:#34d399">verification: ${s.verification_requirements}</span>
            </div>
            <div class="json-view">${JSON.stringify(data.cost_estimate, null, 2)}</div>
          `);
        }

        else if (event === 'validation_done') {
          setStageStatus('validator', 'done');
          const d = data.diagnostics;
          const diagHtml = [
            ...d.errors.map(e => `<div class="diag-item diag-error"><span class="diag-code">${e.code}</span><span>${e.message}</span></div>`),
            ...d.warnings.map(w => `<div class="diag-item diag-warn"><span class="diag-code">${w.code}</span><span>${w.message}</span></div>`),
          ].join('') || `<div class="diag-item diag-ok">Strategy passed all checks</div>`;
          setBody('validator', `<div class="diag-list">${diagHtml}</div>`);
        }

        else if (event === 'compiler_done') {
          setStageStatus('compiler', 'done');
          currentNodes = data.nodes;
          setBody('compiler', `
            <div style="margin-bottom:12px;font-size:12px;color:var(--text-muted)">
              ${data.node_count} nodes · ${data.edge_count} edges · ${data.registers.length} registers
            </div>
            ${renderNodeGraph(data.nodes, data.edges)}
          `);
        }

        else if (event === 'optimizer_done') {
          setStageStatus('optimizer', 'done');
          const diags = data.diagnostics.map(d => `<div style="font-family:monospace;font-size:11px;color:var(--text-muted);padding:3px 0">${d}</div>`).join('');
          setBody('optimizer', `
            <div style="margin-bottom:6px;font-size:12px;color:var(--text-muted)">${data.node_count_after} nodes after optimization</div>
            ${diags}
          `);
        }

        else if (event === 'node_executed') {
          highlightNode(data.node_id, 'executing');
          const color = colorForOpcode(data.opcode);
          if (!provList) {
            const body = document.getElementById('body-runtime');
            body.className = 'stage-body visible';
            body.innerHTML = '<div class="prov-list" id="provList"></div>';
            provList = document.getElementById('provList');
          }
          const conf = data.confidence ?? 1.0;
          const el = document.createElement('div');
          el.className = 'prov-event';
          el.innerHTML = `
            <div>
              <div class="prov-opcode" style="color:${color}">${data.opcode}</div>
              <div class="prov-node-id">${data.node_id}</div>
            </div>
            <div>
              <div class="prov-conf" style="color:${color}">${(conf*100).toFixed(0)}%</div>
              <div class="prov-latency">${data.latency_ms}ms</div>
            </div>
          `;
          provList.appendChild(el);

          // Update register bank
          if (data.registers_written) {
            Object.assign(registers, data.registers_written);
            updateRegBank(registers);
          }

          setTimeout(() => highlightNode(data.node_id, 'done'), 200);
        }

        else if (event === 'runtime_done') {
          setStageStatus('runtime', 'done');
        }

        else if (event === 'metrics_done') {
          setStageStatus('metrics', 'done');
          const m = data.graph_metrics;
          const re = data.reasoning_efficiency;
          setBody('metrics', `
            <div class="metrics-grid">
              <div class="metric-card">
                <div class="metric-label">Nodes</div>
                <div class="metric-value">${m.node_count}</div>
              </div>
              <div class="metric-card">
                <div class="metric-label">Graph Depth</div>
                <div class="metric-value">${m.graph_depth}</div>
              </div>
              <div class="metric-card">
                <div class="metric-label">Registers</div>
                <div class="metric-value">${m.register_count}</div>
              </div>
              <div class="metric-card">
                <div class="metric-label">Verification</div>
                <div class="metric-value">${(m.verification_density*100).toFixed(0)}%</div>
                <div class="metric-unit">density</div>
              </div>
            </div>
            <div class="re-banner">
              <div>
                <div class="re-label">Estimated Reasoning Efficiency (ERE)</div>
                <div class="re-note">${re.note}</div>
              </div>
              <div style="text-align:right">
                <div class="re-score">${re.re_score.toFixed(2)}</div>
                <div class="re-note">projected · ${re.label}</div>
              </div>
            </div>
          `);
        }

        else if (event === 'pipeline_complete') {
          // scroll to end
          const pipeline = document.getElementById('pipeline');
          pipeline.scrollTop = pipeline.scrollHeight;
        }

        else if (event === 'pipeline_error') {
          if (data.stage) setStageStatus(data.stage, 'error');
          const errDiv = document.createElement('div');
          errDiv.style = 'padding:14px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.3);border-radius:10px;color:#f87171;font-size:13px;';
          errDiv.textContent = `Error in [${data.stage}]: ${data.message}`;
          document.getElementById('pipeline').appendChild(errDiv);
        }
      }
    }
  } catch(e) {
    const errDiv = document.createElement('div');
    errDiv.style = 'padding:14px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.3);border-radius:10px;color:#f87171;font-size:13px;';
    errDiv.textContent = `Connection error: ${e.message}. Is the API server running? (uvicorn api.server:app --reload)`;
    document.getElementById('pipeline').appendChild(errDiv);
  } finally {
    btn.disabled = false;
    document.getElementById('btnText').textContent = 'Compile & Execute';
    document.getElementById('btnIcon').textContent = '▶';
  }
}

// Allow Enter+Ctrl to submit
document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) runPipeline();
});
</script>
</body>
</html>
