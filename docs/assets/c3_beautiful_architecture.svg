<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" width="100%" height="100%">
    <defs>
        <!-- Gradients -->
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#1e293b" />
        </linearGradient>
        
        <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e293b" />
            <stop offset="100%" stop-color="#334155" />
        </linearGradient>

        <linearGradient id="nodeGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#1e293b" />
        </linearGradient>
        
        <linearGradient id="accentGradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#8b5cf6" />
        </linearGradient>

        <linearGradient id="accentGradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#10b981" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>

        <linearGradient id="accentGradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f59e0b" />
            <stop offset="100%" stop-color="#ea580c" />
        </linearGradient>
        
        <!-- Shadows & Glows -->
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.4" />
        </filter>

        <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        
        <!-- Arrowhead -->
        <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
        </marker>
        <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
        </marker>
    </defs>

    <!-- Background -->
    <rect width="1200" height="550" fill="url(#bg)" rx="20" />
    
    <!-- Title -->
    <text x="600" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="1">C³ Architecture: Adaptive Reasoning Compilation</text>
    <text x="600" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Typed, Verifiable, Per-Query Graphs with Adaptive Gate Routing</text>

    <!-- ==================== ANIMATED PATHS ==================== -->
    <g fill="none" stroke-width="3" stroke-dasharray="10, 10">
        <!-- Q to Gate -->
        <path id="path_q_gate" d="M 160 240 L 220 240" stroke="#3b82f6" marker-end="url(#arrowBlue)">
            <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.8s" repeatCount="indefinite" />
        </path>
        
        <!-- Gate to Compiler (Hard) -->
        <path id="path_gate_comp" d="M 420 160 L 520 160" stroke="#8b5cf6" marker-end="url(#arrowBlue)">
            <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.8s" repeatCount="indefinite" />
        </path>
        <text x="470" y="150" font-family="sans-serif" font-size="12" font-weight="bold" fill="#8b5cf6" stroke="none" text-anchor="middle">compile: true</text>
        <text x="470" y="175" font-family="sans-serif" font-size="11" fill="#94a3b8" stroke="none" text-anchor="middle">(Hard)</text>

        <!-- Gate to Vanilla (Easy) -->
        <path id="path_gate_vanilla" d="M 320 320 L 320 360 L 520 360" stroke="#f59e0b" marker-end="url(#arrowOrange)">
            <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.8s" repeatCount="indefinite" />
        </path>
        <text x="420" y="350" font-family="sans-serif" font-size="12" font-weight="bold" fill="#f59e0b" stroke="none" text-anchor="middle">compile: false</text>
        <text x="420" y="375" font-family="sans-serif" font-size="11" fill="#94a3b8" stroke="none" text-anchor="middle">(Easy)</text>

        <!-- Compiler to VM -->
        <path id="path_comp_vm" d="M 720 160 L 820 160" stroke="#10b981" marker-end="url(#arrowGreen)">
            <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.8s" repeatCount="indefinite" />
        </path>
        <text x="770" y="150" font-family="sans-serif" font-size="12" font-weight="bold" fill="#10b981" stroke="none" text-anchor="middle">RIR Graph</text>

        <!-- VM to Output -->
        <path id="path_vm_out" d="M 1020 160 L 1040 160 L 1040 260 L 1060 260" stroke="#10b981" marker-end="url(#arrowGreen)">
            <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.8s" repeatCount="indefinite" />
        </path>

        <!-- Vanilla to Output -->
        <path id="path_vanilla_out" d="M 720 360 L 1040 360 L 1040 260 L 1060 260" stroke="#f59e0b" marker-end="url(#arrowOrange)">
            <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.8s" repeatCount="indefinite" />
        </path>
    </g>

    <!-- ==================== NODES ==================== -->
    
    <!-- Node 1: User Query -->
    <g transform="translate(40, 200)">
        <rect width="120" height="80" rx="12" fill="url(#nodeGrad1)" filter="url(#dropShadow)" stroke="#475569" stroke-width="1"/>
        <rect width="6" height="80" rx="3" fill="#3b82f6" />
        <text x="64" y="38" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Natural</text>
        <text x="64" y="58" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Language</text>
    </g>

    <!-- Node 2: Adaptive Compilation Gate -->
    <g transform="translate(220, 160)">
        <rect width="200" height="160" rx="16" fill="url(#nodeGrad1)" filter="url(#dropShadow)" stroke="#475569" stroke-width="1"/>
        <rect width="200" height="8" rx="4" fill="url(#accentGradBlue)" />
        <text x="100" y="40" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Adaptive Gate</text>
        <text x="100" y="60" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">LLM Planner</text>
        
        <rect x="20" y="75" width="160" height="70" rx="8" fill="url(#nodeGradDark)" stroke="#475569" stroke-width="1"/>
        <text x="100" y="100" font-family="monospace" font-size="12" fill="#3b82f6" text-anchor="middle">diff_score: 0.9</text>
        <text x="100" y="130" font-family="monospace" font-size="12" font-weight="bold" fill="#8b5cf6" text-anchor="middle">compile: true</text>
        
        <!-- Pulsing glow for the gate -->
        <circle cx="100" cy="115" r="40" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.5">
            <animate attributeName="r" values="40;50;40" dur="2s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite" />
        </circle>
    </g>

    <!-- Node 3: Vanilla LLM (Bypass) -->
    <g transform="translate(520, 320)">
        <rect width="200" height="80" rx="16" fill="url(#nodeGrad1)" filter="url(#dropShadow)" stroke="#475569" stroke-width="1"/>
        <rect width="200" height="8" rx="4" fill="url(#accentGradOrange)" />
        <text x="100" y="42" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Vanilla LLM</text>
        <text x="100" y="62" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Fast Fallback (0% Verif)</text>
    </g>

    <!-- Node 4: Compiler Core -->
    <g transform="translate(520, 80)">
        <rect width="200" height="160" rx="16" fill="url(#nodeGrad1)" filter="url(#dropShadow)" stroke="#475569" stroke-width="1"/>
        <rect width="200" height="8" rx="4" fill="url(#accentGradBlue)" />
        <text x="100" y="40" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">C³ Compiler</text>
        <text x="100" y="60" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Type Verification &amp; Pass Mgr</text>
        
        <rect x="20" y="80" width="160" height="25" rx="6" fill="url(#nodeGradDark)" stroke="#475569" stroke-width="1"/>
        <text x="100" y="96" font-family="sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle">Dead-node elimination</text>

        <rect x="20" y="115" width="160" height="25" rx="6" fill="url(#nodeGradDark)" stroke="#475569" stroke-width="1"/>
        <text x="100" y="131" font-family="sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle">Lowering to Typed DAG</text>
    </g>

    <!-- Node 5: Runtime / Virtual Machine -->
    <g transform="translate(820, 40)">
        <rect width="200" height="240" rx="16" fill="url(#nodeGrad1)" filter="url(#dropShadow)" stroke="#475569" stroke-width="1"/>
        <rect width="200" height="8" rx="4" fill="url(#accentGradGreen)" />
        <text x="100" y="40" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Runtime VM</text>
        <text x="100" y="60" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Back-End Primitives</text>
        
        <rect x="25" y="80" width="150" height="30" rx="6" fill="url(#nodeGradDark)" stroke="#10b981" stroke-width="1" filter="url(#glowBlue)"/>
        <text x="100" y="100" font-family="monospace" font-size="12" font-weight="bold" fill="#10b981" text-anchor="middle">KNOW.RETRIEVE</text>

        <rect x="25" y="120" width="150" height="30" rx="6" fill="url(#nodeGradDark)" stroke="#10b981" stroke-width="1"/>
        <text x="100" y="140" font-family="monospace" font-size="12" font-weight="bold" fill="#10b981" text-anchor="middle">EXEC.PYTHON</text>

        <rect x="25" y="160" width="150" height="30" rx="6" fill="url(#nodeGradDark)" stroke="#10b981" stroke-width="1"/>
        <text x="100" y="180" font-family="monospace" font-size="12" font-weight="bold" fill="#10b981" text-anchor="middle">VERI.VERIFY</text>

        <rect x="25" y="200" width="150" height="30" rx="6" fill="url(#nodeGradDark)" stroke="#10b981" stroke-width="1"/>
        <text x="100" y="220" font-family="monospace" font-size="12" font-weight="bold" fill="#10b981" text-anchor="middle">REAS.INFER</text>
    </g>

    <!-- Node 6: Output RPS -->
    <g transform="translate(1060, 220)">
        <rect width="100" height="80" rx="12" fill="url(#nodeGrad1)" filter="url(#dropShadow)" stroke="#475569" stroke-width="1"/>
        <rect width="6" height="80" rx="3" fill="#10b981" transform="translate(94, 0)"/>
        <text x="47" y="38" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Answer &amp;</text>
        <text x="47" y="58" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">RPS Trace</text>
    </g>

</svg>
