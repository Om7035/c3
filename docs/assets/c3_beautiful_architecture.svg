<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" width="100%" height="100%">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0b1120" />
            <stop offset="100%" stop-color="#0f172a" />
        </linearGradient>

        <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1e293b" />
            <stop offset="100%" stop-color="#0f172a" />
        </linearGradient>

        <linearGradient id="cardInner" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#020617" />
        </linearGradient>

        <linearGradient id="accentBlue" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#60a5fa" />
            <stop offset="100%" stop-color="#2563eb" />
        </linearGradient>
        <linearGradient id="accentPurple" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#a78bfa" />
            <stop offset="100%" stop-color="#7c3aed" />
        </linearGradient>
        <linearGradient id="accentOrange" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fbbf24" />
            <stop offset="100%" stop-color="#d97706" />
        </linearGradient>
        <linearGradient id="accentGreen" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#34d399" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>

        <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.55" />
        </filter>
        <filter id="glowBlue" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glowPurple" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glowOrange" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glowGreen" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
            <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#60a5fa" />
        </marker>
        <marker id="arrowPurple" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
            <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#a78bfa" />
        </marker>
        <marker id="arrowOrange" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
            <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#fbbf24" />
        </marker>
        <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
            <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#34d399" />
        </marker>

        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.45"/>
        </pattern>
    </defs>

    <!-- Canvas -->
    <rect width="1400" height="700" fill="url(#bg)" rx="24" />
    <rect width="1400" height="700" fill="url(#grid)" rx="24" />

    <!-- Title (reserved zone y=0-95, nothing else may enter above y=100) -->
    <text x="700" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="27" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="0.5">C³ Architecture: Adaptive Reasoning Compilation</text>
    <text x="700" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="500" fill="#94a3b8" text-anchor="middle">Typed, Verifiable, Per-Query Graphs with Adaptive Gate Routing</text>

    <!-- ==================== FLOW PATHS ==================== -->
    <!-- Spine y=390 (Input/Gate/Output centers). Top branch center y=220 (Compiler/RuntimeVM). Bottom branch center y=560 (Vanilla). -->
    <g fill="none" stroke-width="2.5" stroke-dasharray="9, 7">

        <!-- Input -> Gate -->
        <path d="M 200 390 L 280 390" stroke="#60a5fa" marker-end="url(#arrowBlue)" filter="url(#glowBlue)">
            <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.1s" repeatCount="indefinite" />
        </path>

        <!-- Gate -> Compiler (hard path) -->
        <path d="M 500 370 C 555 370, 555 220, 600 220" stroke="#a78bfa" marker-end="url(#arrowPurple)" filter="url(#glowPurple)">
            <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.1s" repeatCount="indefinite" />
        </path>

        <!-- Gate -> Vanilla (easy path) -->
        <path d="M 500 410 C 555 410, 555 560, 600 560" stroke="#fbbf24" marker-end="url(#arrowOrange)" filter="url(#glowOrange)">
            <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.1s" repeatCount="indefinite" />
        </path>

        <!-- Compiler -> Runtime VM -->
        <path d="M 830 220 L 920 220" stroke="#34d399" marker-end="url(#arrowGreen)" filter="url(#glowGreen)">
            <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.1s" repeatCount="indefinite" />
        </path>

        <!-- Runtime VM -> Output -->
        <path d="M 1140 220 C 1195 220, 1195 390, 1240 390" stroke="#34d399" marker-end="url(#arrowGreen)" filter="url(#glowGreen)">
            <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.1s" repeatCount="indefinite" />
        </path>

        <!-- Vanilla -> Output (bypasses runtime, stays clear of the VM box below y=350) -->
        <path d="M 830 560 C 1000 560, 1150 470, 1240 400" stroke="#fbbf24" marker-end="url(#arrowOrange)" filter="url(#glowOrange)">
            <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.1s" repeatCount="indefinite" />
        </path>
    </g>

    <!-- Path labels — confined strictly to the gaps between nodes (gate ends x=500, -->
    <!-- compiler/vanilla start x=600; compiler ends x=830, runtime VM starts x=920) -->
    <g font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">
        <rect x="504" y="278" width="92" height="34" rx="7" fill="#0b1120" opacity="0.9" />
        <text x="550" y="292" fill="#a78bfa" font-size="11">compile: true</text>
        <text x="550" y="306" font-family="sans-serif" font-weight="500" font-size="10" fill="#94a3b8">(Hard)</text>

        <rect x="504" y="468" width="92" height="34" rx="7" fill="#0b1120" opacity="0.9" />
        <text x="550" y="482" fill="#fbbf24" font-size="11">compile: false</text>
        <text x="550" y="496" font-family="sans-serif" font-weight="500" font-size="10" fill="#94a3b8">(Easy)</text>

        <rect x="834" y="206" width="82" height="22" rx="6" fill="#0b1120" opacity="0.9" />
        <text x="875" y="221" fill="#34d399" font-size="10">RIR Graph</text>
    </g>

    <!-- ==================== NODES ==================== -->

    <!-- 1. Natural Language Input (x=40-200, y=340-440, center 390) -->
    <g transform="translate(40, 340)">
        <rect width="160" height="100" rx="14" fill="url(#cardBg)" filter="url(#dropShadow)" stroke="#334155" stroke-width="1.5"/>
        <rect width="6" height="100" rx="3" fill="url(#accentBlue)" />
        <text x="83" y="46" font-family="sans-serif" font-size="14" font-weight="600" fill="#f8fafc" text-anchor="middle">Natural</text>
        <text x="83" y="66" font-family="sans-serif" font-size="14" font-weight="600" fill="#f8fafc" text-anchor="middle">Language</text>
    </g>

    <!-- 2. Adaptive Gate (x=280-500, y=300-480, center 390) -->
    <g transform="translate(280, 300)">
        <rect width="220" height="180" rx="16" fill="url(#cardBg)" filter="url(#dropShadow)" stroke="#334155" stroke-width="1.5"/>
        <rect width="6" height="180" rx="3" fill="url(#accentPurple)" />
        <text x="113" y="38" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Adaptive Gate</text>
        <text x="113" y="58" font-family="sans-serif" font-size="12" font-weight="500" fill="#94a3b8" text-anchor="middle">analyzer.py — LLM Planner</text>

        <rect x="28" y="82" width="164" height="72" rx="8" fill="url(#cardInner)" stroke="#1e293b" stroke-width="1"/>
        <text x="110" y="107" font-family="monospace" font-size="12" fill="#a78bfa" text-anchor="middle">diff_score: 0.9</text>
        <text x="110" y="136" font-family="monospace" font-size="13" font-weight="bold" fill="#f8fafc" text-anchor="middle">compile: true</text>

        <circle cx="173" cy="118" r="4" fill="#a78bfa">
            <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite" />
        </circle>
    </g>

    <!-- 3a. C³ Compiler — hard path (x=600-830, y=120-320, center 220) -->
    <g transform="translate(600, 120)">
        <rect width="230" height="200" rx="16" fill="url(#cardBg)" filter="url(#dropShadow)" stroke="#334155" stroke-width="1.5"/>
        <rect width="6" height="200" rx="3" fill="url(#accentPurple)" />
        <text x="118" y="38" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">C³ Compiler</text>
        <text x="118" y="58" font-family="sans-serif" font-size="12" font-weight="500" fill="#94a3b8" text-anchor="middle">compiler.py — Type Verify + Optimize</text>

        <rect x="28" y="80" width="174" height="30" rx="6" fill="url(#cardInner)" stroke="#1e293b" stroke-width="1"/>
        <text x="115" y="100" font-family="sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle">Dead-Node Elimination</text>

        <rect x="28" y="120" width="174" height="30" rx="6" fill="url(#cardInner)" stroke="#1e293b" stroke-width="1"/>
        <text x="115" y="140" font-family="sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle">Verification-Fusion Pass</text>

        <rect x="28" y="160" width="174" height="30" rx="6" fill="url(#cardInner)" stroke="#1e293b" stroke-width="1"/>
        <text x="115" y="180" font-family="sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle">Lowering to RIR DAG</text>
    </g>

    <!-- 3b. Vanilla LLM — easy path (x=600-830, y=500-620, center 560) -->
    <g transform="translate(600, 500)">
        <rect width="230" height="120" rx="14" fill="url(#cardBg)" filter="url(#dropShadow)" stroke="#334155" stroke-width="1.5"/>
        <rect width="6" height="120" rx="3" fill="url(#accentOrange)" />
        <text x="118" y="48" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Vanilla LLM</text>
        <text x="118" y="70" font-family="sans-serif" font-size="12" font-weight="500" fill="#94a3b8" text-anchor="middle">Fast fallback · 0% verification</text>
        <text x="118" y="92" font-family="monospace" font-size="11" font-weight="600" fill="#fbbf24" text-anchor="middle">vanilla_baseline.py</text>
    </g>

    <!-- 4. Runtime VM (x=920-1140, y=90-350, center 220) -->
    <g transform="translate(920, 90)">
        <rect width="220" height="260" rx="16" fill="url(#cardBg)" filter="url(#dropShadow)" stroke="#334155" stroke-width="1.5"/>
        <rect width="6" height="260" rx="3" fill="url(#accentGreen)" />
        <text x="113" y="38" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Runtime VM</text>
        <text x="113" y="58" font-family="sans-serif" font-size="12" font-weight="500" fill="#94a3b8" text-anchor="middle">executor.py — Operator Library</text>

        <rect x="28" y="80" width="164" height="32" rx="6" fill="url(#cardInner)" stroke="#059669" stroke-width="1.5"/>
        <text x="110" y="101" font-family="monospace" font-size="12" font-weight="bold" fill="#34d399" text-anchor="middle">KNOW.RETRIEVE</text>

        <rect x="28" y="120" width="164" height="32" rx="6" fill="url(#cardInner)" stroke="#059669" stroke-width="1.5"/>
        <text x="110" y="141" font-family="monospace" font-size="12" font-weight="bold" fill="#34d399" text-anchor="middle">EXEC.PYTHON</text>

        <rect x="28" y="160" width="164" height="32" rx="6" fill="url(#cardInner)" stroke="#059669" stroke-width="1.5"/>
        <text x="110" y="181" font-family="monospace" font-size="12" font-weight="bold" fill="#34d399" text-anchor="middle">VERI.VERIFY</text>

        <rect x="28" y="200" width="164" height="32" rx="6" fill="url(#cardInner)" stroke="#059669" stroke-width="1.5"/>
        <text x="110" y="221" font-family="monospace" font-size="12" font-weight="bold" fill="#34d399" text-anchor="middle">REAS.INFER</text>

        <rect width="220" height="260" rx="16" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0">
            <animate attributeName="opacity" values="0;0.35;0" dur="2.4s" repeatCount="indefinite" />
        </rect>
    </g>

    <!-- 5. Output (x=1240-1370, y=335-445, center 390) -->
    <g transform="translate(1240, 335)">
        <rect width="130" height="110" rx="14" fill="url(#cardBg)" filter="url(#dropShadow)" stroke="#334155" stroke-width="1.5"/>
        <rect x="124" width="6" height="110" rx="3" fill="url(#accentGreen)" />
        <text x="60" y="48" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Answer &amp;</text>
        <text x="60" y="68" font-family="sans-serif" font-size="14" font-weight="bold" fill="#34d399" text-anchor="middle">RPS Trace</text>
        <text x="60" y="90" font-family="monospace" font-size="10" font-weight="500" fill="#94a3b8" text-anchor="middle">provenance log</text>
    </g>

</svg>
