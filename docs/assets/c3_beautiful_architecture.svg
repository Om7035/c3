<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
    <defs>
        <!-- Gradients -->
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f8fafc" />
            <stop offset="100%" stop-color="#eff6ff" />
        </linearGradient>
        
        <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#f1f5f9" />
        </linearGradient>
        
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#8b5cf6" />
        </linearGradient>

        <linearGradient id="accentGradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#10b981" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>
        
        <!-- Shadows -->
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
        
        <!-- Arrowhead -->
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
        </marker>
        <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
    </defs>

    <!-- Background -->
    <rect width="1000" height="500" fill="url(#bg)" rx="20" />
    
    <!-- Title -->
    <text x="500" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle" letter-spacing="1">C³ Compiler Architecture</text>
    <text x="500" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Typed, Verifiable, Per-Query Reasoning Programs</text>

    <!-- ==================== LINES ==================== -->
    <path d="M 160 250 L 260 250" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <path d="M 460 250 L 530 250" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <path d="M 730 250 L 790 250" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <path d="M 360 290 L 360 360 L 630 360 L 630 290" stroke="#3b82f6" stroke-dasharray="6,6" stroke-width="2" fill="none" />
    <text x="495" y="380" font-family="sans-serif" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">Reasoning Intermediate Representation (RIR)</text>

    <!-- ==================== NODES ==================== -->
    
    <!-- Node 1: User Query -->
    <g transform="translate(40, 210)">
        <rect width="120" height="80" rx="12" fill="url(#nodeGrad1)" filter="url(#dropShadow)" />
        <rect width="8" height="80" rx="4" fill="#64748b" />
        <text x="64" y="38" font-family="sans-serif" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">Natural</text>
        <text x="64" y="58" font-family="sans-serif" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">Language</text>
    </g>

    <!-- Node 2: Planner (Front-End) -->
    <g transform="translate(260, 170)">
        <rect width="200" height="160" rx="16" fill="url(#nodeGrad1)" filter="url(#dropShadow)" />
        <rect width="200" height="8" rx="4" fill="url(#accentGrad)" />
        <text x="100" y="40" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">LLM Planner</text>
        <text x="100" y="60" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Front-End Synthesizer</text>
        
        <rect x="20" y="80" width="160" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" />
        <text x="100" y="105" font-family="monospace" font-size="11" fill="#3b82f6" text-anchor="middle">generate(AST)</text>
        <text x="100" y="125" font-family="monospace" font-size="11" fill="#8b5cf6" text-anchor="middle">{ type: "strategy" }</text>
    </g>

    <!-- Node 3: Compiler Core (Middle-End) -->
    <g transform="translate(530, 170)">
        <rect width="200" height="160" rx="16" fill="url(#nodeGrad1)" filter="url(#dropShadow)" />
        <rect width="200" height="8" rx="4" fill="url(#accentGrad)" />
        <text x="100" y="40" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">C³ Compiler</text>
        <text x="100" y="60" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Type Verification &amp; Pass Mgr</text>
        
        <rect x="20" y="80" width="160" height="25" rx="6" fill="#f8fafc" stroke="#e2e8f0" />
        <text x="100" y="96" font-family="sans-serif" font-size="11" font-weight="600" fill="#334155" text-anchor="middle">Dead-node elimination</text>

        <rect x="20" y="115" width="160" height="25" rx="6" fill="#f8fafc" stroke="#e2e8f0" />
        <text x="100" y="131" font-family="sans-serif" font-size="11" font-weight="600" fill="#334155" text-anchor="middle">Lowering to Typed DAG</text>
    </g>

    <!-- Node 4: Runtime / Virtual Machine -->
    <g transform="translate(790, 130)">
        <rect width="170" height="240" rx="16" fill="url(#nodeGrad1)" filter="url(#dropShadow)" />
        <rect width="170" height="8" rx="4" fill="url(#accentGradGreen)" />
        <text x="85" y="40" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">Runtime VM</text>
        <text x="85" y="60" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Back-End Primitives</text>
        
        <rect x="20" y="80" width="130" height="30" rx="6" fill="#ecfdf5" stroke="#10b981" />
        <text x="85" y="100" font-family="monospace" font-size="12" font-weight="bold" fill="#059669" text-anchor="middle">KNOW.RETRIEVE</text>

        <rect x="20" y="120" width="130" height="30" rx="6" fill="#ecfdf5" stroke="#10b981" />
        <text x="85" y="140" font-family="monospace" font-size="12" font-weight="bold" fill="#059669" text-anchor="middle">EXEC.PYTHON</text>

        <rect x="20" y="160" width="130" height="30" rx="6" fill="#ecfdf5" stroke="#10b981" />
        <text x="85" y="180" font-family="monospace" font-size="12" font-weight="bold" fill="#059669" text-anchor="middle">VERI.VERIFY</text>

        <rect x="20" y="200" width="130" height="30" rx="6" fill="#ecfdf5" stroke="#10b981" />
        <text x="85" y="220" font-family="monospace" font-size="12" font-weight="bold" fill="#059669" text-anchor="middle">REAS.INFER</text>
    </g>

</svg>
