<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%" height="100%">
    <defs>
        <!-- Background Gradients -->
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0b1120" />
            <stop offset="100%" stop-color="#0f172a" />
        </linearGradient>
        
        <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1e293b" />
            <stop offset="100%" stop-color="#0f172a" />
        </linearGradient>

        <linearGradient id="cardInner" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#020617" />
        </linearGradient>
        
        <!-- Accents -->
        <linearGradient id="accentBlue" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#60a5fa" />
            <stop offset="100%" stop-color="#2563eb" />
        </linearGradient>
        <linearGradient id="accentPurple" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#a78bfa" />
            <stop offset="100%" stop-color="#7c3aed" />
        </linearGradient>
        <linearGradient id="accentOrange" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fbbf24" />
            <stop offset="100%" stop-color="#d97706" />
        </linearGradient>
        <linearGradient id="accentGreen" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#34d399" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>
        
        <!-- Shadows & Glows -->
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.6" />
        </filter>
        <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glowPurple" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glowOrange" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        
        <!-- Arrowheads -->
        <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M 0 0 L 8 4 L 0 8 z" fill="#60a5fa" />
        </marker>
        <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M 0 0 L 8 4 L 0 8 z" fill="#a78bfa" />
        </marker>
        <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M 0 0 L 8 4 L 0 8 z" fill="#fbbf24" />
        </marker>
        <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M 0 0 L 8 4 L 0 8 z" fill="#34d399" />
        </marker>

        <!-- Grid Pattern -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
        </pattern>
    </defs>

    <!-- Canvas -->
    <rect width="1200" height="600" fill="url(#bg)" rx="24" />
    <rect width="1200" height="600" fill="url(#grid)" rx="24" />
    
    <!-- Title -->
    <text x="600" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="1">C³ Architecture: Adaptive Reasoning Compilation</text>
    <text x="600" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="500" fill="#94a3b8" text-anchor="middle">Typed, Verifiable, Per-Query Graphs with Adaptive Gate Routing</text>

    <!-- ==================== ANIMATED PATHS (Flow) ==================== -->
    <g fill="none" stroke-width="2.5" stroke-dasharray="8, 8">
        
        <!-- Query to Gate -->
        <path id="path_q_gate" d="M 160 300 L 220 300" stroke="#60a5fa" marker-end="url(#arrowBlue)" filter="url(#glowBlue)">
            <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.6s" repeatCount="indefinite" />
        </path>
        
        <!-- Gate to Compiler (Hard) -->
        <path id="path_gate_comp" d="M 420 300 C 470 300, 470 160, 520 160" stroke="#a78bfa" marker-end="url(#arrowPurple)" filter="url(#glowPurple)">
            <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.6s" repeatCount="indefinite" />
        </path>

        <!-- Gate to Vanilla (Easy) -->
        <path id="path_gate_vanilla" d="M 420 300 C 470 300, 470 440, 520 440" stroke="#fbbf24" marker-end="url(#arrowOrange)" filter="url(#glowOrange)">
            <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.6s" repeatCount="indefinite" />
        </path>

        <!-- Compiler to VM -->
        <path id="path_comp_vm" d="M 720 160 L 820 160" stroke="#34d399" marker-end="url(#arrowGreen)" filter="url(#glowGreen)">
            <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.6s" repeatCount="indefinite" />
        </path>

        <!-- VM to Output -->
        <path id="path_vm_out" d="M 1020 160 C 1035 160, 1035 300, 1050 300" stroke="#34d399" marker-end="url(#arrowGreen)" filter="url(#glowGreen)">
            <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.6s" repeatCount="indefinite" />
        </path>

        <!-- Vanilla to Output -->
        <path id="path_vanilla_out" d="M 720 440 C 900 440, 900 300, 1050 300" stroke="#fbbf24" marker-end="url(#arrowOrange)" filter="url(#glowOrange)">
            <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.6s" repeatCount="indefinite" />
        </path>
    </g>

    <!-- Path Text Labels -->
    <text x="475" y="210" font-family="monospace" font-size="12" font-weight="bold" fill="#a78bfa" text-anchor="middle">compile: true</text>
    <text x="475" y="228" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(Hard)</text>
    
    <text x="475" y="380" font-family="monospace" font-size="12" font-weight="bold" fill="#fbbf24" text-anchor="middle">compile: false</text>
    <text x="475" y="398" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(Easy)</text>
    
    <text x="770" y="145" font-family="sans-serif" font-size="12" font-weight="bold" fill="#34d399" text-anchor="middle">RIR Graph</text>


    <!-- ==================== NODES ==================== -->
    
    <!-- 1. User Query (40, 260) -->
    <g transform="translate(40, 260)">
        <rect width="120" height="80" rx="12" fill="url(#cardBg)" filter="url(#dropShadow)" stroke="#334155" stroke-width="1.5"/>
        <rect width="6" height="80" rx="3" fill="url(#accentBlue)" />
        <text x="64" y="38" font-family="sans-serif" font-size="14" font-weight="600" fill="#f8fafc" text-anchor="middle">Natural</text>
        <text x="64" y="58" font-family="sans-serif" font-size="14" font-weight="600" fill="#f8fafc" text-anchor="middle">Language</text>
    </g>

    <!-- 2. Adaptive Gate (220, 220) -->
    <g transform="translate(220, 220)">
        <rect width="200" height="160" rx="16" fill="url(#cardBg)" filter="url(#dropShadow)" stroke="#334155" stroke-width="1.5"/>
        <rect width="6" height="160" rx="3" fill="url(#accentPurple)" />
        <text x="106" y="35" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Adaptive Gate</text>
        <text x="106" y="55" font-family="sans-serif" font-size="12" font-weight="500" fill="#94a3b8" text-anchor="middle">LLM Planner</text>
        
        <rect x="25" y="75" width="150" height="65" rx="8" fill="url(#cardInner)" stroke="#1e293b" stroke-width="1"/>
        <text x="100" y="98" font-family="monospace" font-size="12" fill="#a78bfa" text-anchor="middle">diff_score: 0.9</text>
        <text x="100" y="125" font-family="monospace" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle">compile: true</text>
        
        <!-- Pulsing indicator inside the gate -->
        <circle cx="160" cy="111" r="4" fill="#a78bfa">
            <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" />
        </circle>
    </g>

    <!-- 3. C³ Compiler (520, 80) -->
    <g transform="translate(520, 80)">
        <rect width="200" height="160" rx="16" fill="url(#cardBg)" filter="url(#dropShadow)" stroke="#334155" stroke-width="1.5"/>
        <rect width="6" height="160" rx="3" fill="url(#accentPurple)" />
        <text x="106" y="35" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">C³ Compiler</text>
        <text x="106" y="55" font-family="sans-serif" font-size="12" font-weight="500" fill="#94a3b8" text-anchor="middle">Type Verification &amp; IR</text>
        
        <rect x="25" y="75" width="150" height="28" rx="6" fill="url(#cardInner)" stroke="#1e293b" stroke-width="1"/>
        <text x="100" y="94" font-family="sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle">Dead-node elimination</text>

        <rect x="25" y="115" width="150" height="28" rx="6" fill="url(#cardInner)" stroke="#1e293b" stroke-width="1"/>
        <text x="100" y="134" font-family="sans-serif" font-size="11" font-weight="600" fill="#cbd5e1" text-anchor="middle">Lowering to Typed DAG</text>
    </g>

    <!-- 4. Vanilla LLM (520, 400) -->
    <g transform="translate(520, 400)">
        <rect width="200" height="80" rx="12" fill="url(#cardBg)" filter="url(#dropShadow)" stroke="#334155" stroke-width="1.5"/>
        <rect width="6" height="80" rx="3" fill="url(#accentOrange)" />
        <text x="106" y="38" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Vanilla LLM</text>
        <text x="106" y="58" font-family="sans-serif" font-size="12" font-weight="500" fill="#94a3b8" text-anchor="middle">Fast Fallback (0% Verif)</text>
    </g>

    <!-- 5. Runtime VM (820, 40) -->
    <g transform="translate(820, 40)">
        <rect width="200" height="240" rx="16" fill="url(#cardBg)" filter="url(#dropShadow)" stroke="#334155" stroke-width="1.5"/>
        <rect width="6" height="240" rx="3" fill="url(#accentGreen)" />
        <text x="106" y="35" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f8fafc" text-anchor="middle">Runtime VM</text>
        <text x="106" y="55" font-family="sans-serif" font-size="12" font-weight="500" fill="#94a3b8" text-anchor="middle">Back-End Primitives</text>
        
        <rect x="25" y="75" width="150" height="32" rx="6" fill="url(#cardInner)" stroke="#059669" stroke-width="1.5"/>
        <text x="100" y="96" font-family="monospace" font-size="12" font-weight="bold" fill="#34d399" text-anchor="middle">KNOW.RETRIEVE</text>

        <rect x="25" y="115" width="150" height="32" rx="6" fill="url(#cardInner)" stroke="#059669" stroke-width="1.5"/>
        <text x="100" y="136" font-family="monospace" font-size="12" font-weight="bold" fill="#34d399" text-anchor="middle">EXEC.PYTHON</text>

        <rect x="25" y="155" width="150" height="32" rx="6" fill="url(#cardInner)" stroke="#059669" stroke-width="1.5"/>
        <text x="100" y="176" font-family="monospace" font-size="12" font-weight="bold" fill="#34d399" text-anchor="middle">VERI.VERIFY</text>

        <rect x="25" y="195" width="150" height="32" rx="6" fill="url(#cardInner)" stroke="#059669" stroke-width="1.5"/>
        <text x="100" y="216" font-family="monospace" font-size="12" font-weight="bold" fill="#34d399" text-anchor="middle">REAS.INFER</text>
    </g>

    <!-- 6. Output RPS (1050, 260) -->
    <g transform="translate(1050, 260)">
        <rect width="110" height="80" rx="12" fill="url(#cardBg)" filter="url(#dropShadow)" stroke="#334155" stroke-width="1.5"/>
        <rect width="6" height="80" rx="3" fill="url(#accentGreen)" transform="translate(104, 0)"/>
        <text x="52" y="38" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Answer &amp;</text>
        <text x="52" y="58" font-family="sans-serif" font-size="14" font-weight="bold" fill="#34d399" text-anchor="middle">RPS Trace</text>
    </g>

</svg>
